apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edge-orch-state-aggregator
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: state-aggregator=192.168.0.56:5000/state-aggregator:latest
    argocd-image-updater.argoproj.io/state-aggregator.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dsa04156/workflow-edge-orch.git'
    path: state-aggregator/k8s
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
