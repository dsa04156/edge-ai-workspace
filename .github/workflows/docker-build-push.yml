name: Build and Push Images to Local Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: 192.168.0.56:5000

jobs:
  build-and-push:
    runs-on: self-hosted
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Buildx for Local Registry
        run: |
          docker buildx rm edgeai-builder || true
          docker buildx create \
            --name edgeai-builder \
            --driver docker-container \
            --config .github/buildkitd.toml \
            --use \
            --bootstrap

      - name: Build and Push state-aggregator
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${{ env.REGISTRY }}/state-aggregator:latest \
            -f edge-orch/state-aggregator/Dockerfile \
            edge-orch/state-aggregator \
            --push

      - name: Build and Push workflow-executor
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${{ env.REGISTRY }}/workflow-executor:latest \
            -f edge-orch/workflow_executor/Dockerfile \
            edge-orch/workflow_executor \
            --push

      - name: Build and Push placement-engine
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${{ env.REGISTRY }}/placement-engine:latest \
            -f edge-orch/placement_engine/Dockerfile \
            edge-orch/placement_engine \
            --push

      - name: Build and Push vision-stage-runner
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${{ env.REGISTRY }}/vision-stage-runner:latest \
            -f edge-orch/vision_stage_runner/Dockerfile \
            edge-orch/vision_stage_runner \
            --push

      - name: Deploy state-aggregator latest image
        run: |
          CURRENT_IMAGE=$(kubectl get deployment state-aggregator -n default -o jsonpath='{.spec.template.spec.containers[?(@.name=="state-aggregator")].image}')
          TARGET_IMAGE=${{ env.REGISTRY }}/state-aggregator:latest

          kubectl set image deployment/state-aggregator \
            state-aggregator=${TARGET_IMAGE} \
            -n default

          if [ "${CURRENT_IMAGE}" = "${TARGET_IMAGE}" ]; then
            kubectl rollout restart deployment/state-aggregator -n default
          fi

          kubectl rollout status deployment/state-aggregator -n default --timeout=180s
