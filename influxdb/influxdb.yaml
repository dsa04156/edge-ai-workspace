apiVersion: v1
kind: Namespace
metadata:
  name: telemetry
---
apiVersion: v1
kind: Secret
metadata:
  name: influxdb-init
  namespace: telemetry
type: Opaque
stringData:
  DOCKER_INFLUXDB_INIT_USERNAME: admin
  # ⚠️ WARNING: Change these in production! Use Kubernetes Secrets properly.
  # Default values for development only. Override with real secrets in production.
  DOCKER_INFLUXDB_INIT_PASSWORD: changeme  # TODO: Use sealed-secrets or external-secrets
  DOCKER_INFLUXDB_INIT_ORG: edgeai
  DOCKER_INFLUXDB_INIT_BUCKET: device_telemetry
  DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: changeme  # TODO: Generate secure token
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-data
  namespace: telemetry
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: influxdb
  namespace: telemetry
spec:
  serviceName: influxdb
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      nodeSelector:
        kubernetes.io/hostname: etri-ser0001-cg0msb
      containers:
        - name: influxdb
          image: influxdb:2.7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: setup
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: influxdb-init
                  key: DOCKER_INFLUXDB_INIT_USERNAME
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: influxdb-init
                  key: DOCKER_INFLUXDB_INIT_PASSWORD
            - name: DOCKER_INFLUXDB_INIT_ORG
              valueFrom:
                secretKeyRef:
                  name: influxdb-init
                  key: DOCKER_INFLUXDB_INIT_ORG
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              valueFrom:
                secretKeyRef:
                  name: influxdb-init
                  key: DOCKER_INFLUXDB_INIT_BUCKET
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-init
                  key: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
            - name: influxdb-config
              mountPath: /etc/influxdb2
      volumes:
        - name: influxdb-data
          persistentVolumeClaim:
            claimName: influxdb-data
        - name: influxdb-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: telemetry
spec:
  type: ClusterIP
  selector:
    app: influxdb
  ports:
    - name: http
      port: 8086
      targetPort: 8086