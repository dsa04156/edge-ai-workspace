apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudcore-argo-access
rules:
- apiGroups: ["argoproj.io"]
  resources:
    - workflowtaskresults
    - workflows
    - workflowtasksets
    - workflowtemplates
    - clusterworkflowtemplates
    - cronworkflows
    - workflowartifactgctasks
  verbs: ["get","list","watch","create","update","patch","delete"]