# 1. 워크플로우를 조작할 수 있는 '공장장 권한' 정의 (클러스터 전체 적용)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-events-workflow-admin
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

---
# 2. 'argo-events' 네임스페이스의 'default' 계정에게 위 권한을 연결!
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-events-workflow-admin-binding
subjects:
  - kind: ServiceAccount
    name: default # <--- Sensor 파드가 사용 중인 기본 계정
    namespace: argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-events-workflow-admin
