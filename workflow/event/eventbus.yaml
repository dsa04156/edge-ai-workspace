apiVersion: argoproj.io/v1alpha1
kind: EventBus
metadata:
  name: default
  namespace: argo-events
spec:
  nats:
    native:
      replicas: 1 # 클러스터링 통신 오류를 원천 차단하기 위해 1개만 띄우는 것을 강력 권장합니다.
      auth: none
      # [핵심] NATS가 무조건 마스터 노드에만 뜨도록 강제합니다.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "" 
        # 만약 위 라벨이 안 먹히면 아래처럼 호스트 이름으로 지정하세요.
        # kubernetes.io/hostname: etri-system-product-name
